spring:
  application:
    name: Backend
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/backend}
    driver-class-name: org.postgresql.Driver
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:test1234}
    hikari:
      minimum-idle: 0
      maximum-pool-size: ${DB_POOL_MAX_SIZE:3}
      idle-timeout: 30000
      connection-timeout: 30000
      validation-timeout: 3000
      keepalive-time: 0
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration

springdoc:
  default-flat-param-object: true
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  api-docs:
    path: /api-docs
  default-consumes-media-type: application/json
  default-produces-media-type: application/json

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      probes:
        enabled: true
      show-details: never
