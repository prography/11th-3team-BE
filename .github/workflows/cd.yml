name: CD
run-name: "CD — ${{ github.ref_name }}@${{ github.sha }}"

on:
  push:
    branches: [ "main" ]

permissions:
  id-token: write
  contents: read
  packages: write

concurrency:
  group: cd-main
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"
          cache: gradle

      - name: Grant execute permission for Gradle wrapper
        run: chmod +x ./gradlew

      - name: Run Gradle clean build
        env:
          SPRING_PROFILES_ACTIVE: local
        run: ./gradlew clean build

  deploy:
    needs: build-and-test
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"
          cache: gradle

      - name: Grant execute permission for Gradle wrapper
        run: chmod +x ./gradlew

      - name: Build application JAR
        run: ./gradlew --no-daemon bootJar -x test

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ap-northeast-2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          provenance: false
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend
          tags: |
            ghcr.io/prography/11th-3team-be:latest
            ghcr.io/prography/11th-3team-be:${{ github.sha }}

      - name: Deploy to EC2 via SSM
        env:
          IMAGE_NAME: ghcr.io/prography/11th-3team-be
          IMAGE_TAG: ${{ github.sha }}
          SPRING_PROFILES_ACTIVE: prod
          SECRETS_ID: ${{ secrets.SECRETS_ID }}
          EC2_INSTANCE_ID: ${{ secrets.EC2_INSTANCE_ID }}
          AWSLOGS_REGION: ap-northeast-2
          AWSLOGS_GROUP: /prography/backend
          AWSLOGS_STREAM_PREFIX: prography-backend
        run: |
          set -euo pipefail

          DEPLOY_SCRIPT_B64="$(base64 -w 0 script/deploy.sh)"

          jq -n \
            --arg deploy_dir "/home/ubuntu/prography/script" \
            --arg deploy_script_b64 "$DEPLOY_SCRIPT_B64" \
            --arg image_name "$IMAGE_NAME" \
            --arg image_tag "$IMAGE_TAG" \
            --arg secrets_id "$SECRETS_ID" \
            --arg spring_profiles_active "$SPRING_PROFILES_ACTIVE" \
            --arg healthcheck_url "http://localhost:8080/actuator/health" \
            --arg awslogs_region "$AWSLOGS_REGION" \
            --arg awslogs_group "$AWSLOGS_GROUP" \
            --arg awslogs_stream_prefix "$AWSLOGS_STREAM_PREFIX" \
            '{
              commands: [
                "mkdir -p \($deploy_dir)",
                "printf %s " + ($deploy_script_b64 | @sh) + " | base64 -d > \($deploy_dir)/deploy.sh",
                "chmod +x \($deploy_dir)/deploy.sh",
                "IMAGE_NAME=" + ($image_name | @sh)
                  + " IMAGE_TAG=" + ($image_tag | @sh)
                  + " SECRETS_ID=" + ($secrets_id | @sh)
                  + " CONTAINER_NAME=prography-backend"
                  + " SPRING_PROFILES_ACTIVE=" + ($spring_profiles_active | @sh)
                  + " HEALTHCHECK_URL=" + ($healthcheck_url | @sh)
                  + " AWSLOGS_REGION=" + ($awslogs_region | @sh)
                  + " AWSLOGS_GROUP=" + ($awslogs_group | @sh)
                  + " AWSLOGS_STREAM_PREFIX=" + ($awslogs_stream_prefix | @sh)
                  + " \($deploy_dir)/deploy.sh"
              ]
            }' > ssm-commands.json

          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "$EC2_INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --comment "Deploy Prography" \
            --parameters file://ssm-commands.json \
            --timeout-seconds 600 \
            --query "Command.CommandId" --output text)

          echo "COMMAND_ID=$COMMAND_ID" >> "$GITHUB_ENV"

          echo "Waiting for deployment to complete (up to 10 minutes)..."
          for i in $(seq 1 60); do
            STATUS=$(aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "$EC2_INSTANCE_ID" \
              --query "Status" --output text 2>/dev/null || echo "Pending")

            echo "[$i/60] Status: $STATUS"

            if [ "$STATUS" = "Success" ]; then
              echo "Deployment succeeded."
              break
            elif [ "$STATUS" = "Failed" ] || [ "$STATUS" = "Cancelled" ] || [ "$STATUS" = "TimedOut" ]; then
              echo "Deployment failed with status: $STATUS"
              exit 1
            fi

            if [ "$i" -eq 60 ]; then
              echo "Timed out waiting for deployment."
              exit 1
            fi

            sleep 10
          done

      - name: Fetch SSM output
        if: always() && env.COMMAND_ID != ''
        env:
          EC2_INSTANCE_ID: ${{ secrets.EC2_INSTANCE_ID }}
          COMMAND_ID: ${{ env.COMMAND_ID }}
        run: |
          aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "$EC2_INSTANCE_ID" \
            --output text
